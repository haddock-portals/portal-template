name: Sync portal to all clients

on:
  push:
    branches: [main]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync index.html a todos los repos de la org
        env:
          TOKEN: ${{ secrets.ORG_SYNC_TOKEN }}
        run: |
          git config --global user.email "sync@haddock-portals.com"
          git config --global user.name "Haddock Sync"

          repos=$(curl -s -H "Authorization: token $TOKEN" \
            "https://api.github.com/orgs/haddock-portals/repos?per_page=100" \
            | grep '"name"' | awk -F'"' '{print $4}')

          TEMPLATE_DIR="$(pwd)"

          for repo in $repos; do
            if [ "$repo" = "portal-template" ]; then
              continue
            fi

            echo "Sincronizando $repo..."

            REPO_DIR="/tmp/${repo}"
            git clone "https://x-access-token:${TOKEN}@github.com/haddock-portals/${repo}.git" "$REPO_DIR"

            # Extraer el slug del cliente desde el repo actual (preservar fallback)
            CLIENT_SLUG=$(git -C "$REPO_DIR" show HEAD:index.html 2>/dev/null | grep -o "urlParams.get('c') || '[^']*'" | grep -o "'[^']*'" | tail -1 | tr -d "'" || echo "")

            cp "$TEMPLATE_DIR/portal-cliente.html" "$REPO_DIR/index.html"

            # Restaurar el slug del cliente si existía
            if [ -n "$CLIENT_SLUG" ] && [ "$CLIENT_SLUG" != "" ]; then
              sed -i "s/urlParams.get('c') || ''/urlParams.get('c') || '$CLIENT_SLUG'/" "$REPO_DIR/index.html"
            fi

            git -C "$REPO_DIR" add index.html
            if git -C "$REPO_DIR" diff --staged --quiet; then
              echo "Sin cambios en $repo"
            else
              git -C "$REPO_DIR" commit -m "sync: update index.html"
              git -C "$REPO_DIR" push
              echo "Actualizado $repo"
            fi
          done
